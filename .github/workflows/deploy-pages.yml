name: NYANAM - Deploy compiled website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out website source
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production website
        run: npm run build

      - name: Verify compiled artifact
        shell: bash
        run: |
          test -f dist/index.html
          if grep -q '/src/main.tsx' dist/index.html; then
            echo 'Build verification failed: raw Vite source was found in dist/index.html.'
            exit 1
          fi
          grep -q '/Nyanam/assets/' dist/index.html
          touch dist/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload compiled website
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

      - name: Deploy compiled website
        id: deployment
        uses: actions/deploy-pages@v5
